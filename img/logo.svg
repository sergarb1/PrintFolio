<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- Icono: hoja con líneas y esquina doblada -->
  <g transform="translate(4,5)">
    <!-- Cuerpo de la hoja -->
    <rect x="2" y="2" width="36" height="40" rx="3" fill="white" stroke="#1a365d" stroke-width="1.5"/>
    <!-- Esquina doblada -->
    <path d="M28 2 L28 14 L38 14" fill="white" stroke="#1a365d" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M28 2 L28 14 L38 14" fill="#eef2f6"/>
    <!-- Líneas de papel rayado -->
    <line x1="8" y1="10" x2="26" y2="10" stroke="#1a365d" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <line x1="8" y1="16" x2="32" y2="16" stroke="#1a365d" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <line x1="8" y1="22" x2="34" y2="22" stroke="#1a365d" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <line x1="8" y1="28" x2="30" y2="28" stroke="#1a365d" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <line x1="8" y1="34" x2="24" y2="34" stroke="#1a365d" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <!-- Acento decorativo -->
    <circle cx="32" cy="34" r="3" fill="#f59e0b" opacity="0.8"/>
  </g>
  <!-- Texto -->
  <text x="52" y="32" font-family="'Segoe UI', system-ui, sans-serif" font-size="24" font-weight="700" fill="#1a365d" letter-spacing="-0.5">Print</text>
  <text x="98" y="32" font-family="'Segoe UI', system-ui, sans-serif" font-size="24" font-weight="300" fill="#64748b" letter-spacing="-0.5">Folio</text>
</svg>
